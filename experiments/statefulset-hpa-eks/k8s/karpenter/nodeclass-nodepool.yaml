apiVersion: karpenter.k8s.aws/v1
kind: EC2NodeClass
metadata:
  name: default
spec:
  role: "__NODE_ROLE__"
  subnetSelectorTerms:
    - tags:
        karpenter.sh/discovery: "__CLUSTER_NAME__"
  securityGroupSelectorTerms:
    - tags:
        karpenter.sh/discovery: "__CLUSTER_NAME__"
  amiSelectorTerms:
    - alias: al2023@latest
  tags:
    karpenter.sh/discovery: "__CLUSTER_NAME__"
---
apiVersion: karpenter.sh/v1
kind: NodePool
metadata:
  name: default
spec:
  template:
    spec:
      nodeClassRef:
        group: karpenter.k8s.aws
        kind: EC2NodeClass
        name: default
      requirements:
        - key: karpenter.sh/capacity-type
          operator: In
          values: ["on-demand"]
        - key: kubernetes.io/arch
          operator: In
          values: ["amd64","arm64"]
        - key: kubernetes.io/os
          operator: In
          values: ["linux"]
      # Keep the demo flexible: Karpenter will pick an instance type that fits requests.
  disruption:
    consolidationPolicy: WhenEmptyOrUnderutilized
    consolidateAfter: 1m
  limits:
    cpu: "200"
