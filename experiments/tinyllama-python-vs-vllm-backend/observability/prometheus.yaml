apiVersion: v1
kind: Namespace
metadata:
  name: observability

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: prometheus
  namespace: observability
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::099019764096:role/tinyllama-prom-amp-irsa-935e5402

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: observability
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s

    remote_write:
      - url: https://aps-workspaces.us-east-1.amazonaws.com/workspaces/ws-935e5402-9908-4935-9a1b-dd201b3fd023/api/v1/remote_write
        sigv4:
          region: us-east-1

    scrape_configs:
      - job_name: triton
        metrics_path: /metrics
        static_configs:
          - targets:
              - tinyllama-triton-hf-metrics.tinyllama.svc.cluster.local:8002
              - tinyllama-triton-vllm-metrics.tinyllama.svc.cluster.local:8002

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: observability
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus
  template:
    metadata:
      labels:
        app: prometheus
    spec:
      serviceAccountName: prometheus
      containers:
      - name: prometheus
        image: prom/prometheus:v2.52.0
        args:
          - --config.file=/etc/prometheus/prometheus.yml
          - --storage.tsdb.path=/prometheus
        ports:
          - containerPort: 9090
        volumeMounts:
          - name: config
            mountPath: /etc/prometheus
          - name: data
            mountPath: /prometheus
      volumes:
        - name: config
          configMap:
            name: prometheus-config
        - name: data
          emptyDir: {}

---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: observability
spec:
  type: ClusterIP
  selector:
    app: prometheus
  ports:
    - name: http
      port: 9090
      targetPort: 9090

