apiVersion: v1
kind: Namespace
metadata:
  name: observability

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: jaeger
  namespace: observability
spec:
  replicas: 1
  selector:
    matchLabels:
      app: jaeger
  template:
    metadata:
      labels:
        app: jaeger
    spec:
      containers:
      - name: jaeger
        image: jaegertracing/all-in-one:1.62.0
        ports:
        - containerPort: 16686 # query UI
        - containerPort: 4318  # OTLP HTTP
        - containerPort: 4317  # OTLP gRPC
        - containerPort: 14268 # jaeger http thrift
        - containerPort: 14250 # jaeger grpc
        env:
        - name: COLLECTOR_OTLP_ENABLED
          value: "true"

---
apiVersion: v1
kind: Service
metadata:
  name: jaeger-query
  namespace: observability
spec:
  type: ClusterIP
  selector:
    app: jaeger
  ports:
  - name: query
    port: 16686
    targetPort: 16686

---
apiVersion: v1
kind: Service
metadata:
  name: jaeger-query-internal
  namespace: observability
  annotations:
    service.beta.kubernetes.io/aws-load-balancer-internal: "true"
spec:
  type: LoadBalancer
  selector:
    app: jaeger
  ports:
  - name: query
    port: 16686
    targetPort: 16686

---
apiVersion: v1
kind: Service
metadata:
  name: jaeger-collector
  namespace: observability
spec:
  type: ClusterIP
  selector:
    app: jaeger
  ports:
  - name: otlp-http
    port: 4318
    targetPort: 4318
  - name: otlp-grpc
    port: 4317
    targetPort: 4317
  - name: jaeger-http-thrift
    port: 14268
    targetPort: 14268
  - name: jaeger-grpc
    port: 14250
    targetPort: 14250

