apiVersion: apps/v1
kind: Deployment
metadata:
  name: tinyllama-triton-hf
  namespace: tinyllama
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: tinyllama-triton-hf
  template:
    metadata:
      labels:
        app: tinyllama-triton-hf
    spec:
      volumes:
      - name: models
        emptyDir: {}
      # Some backends benefit from a large /dev/shm.
      - name: dshm
        emptyDir:
          medium: Memory
      - name: hf-model-files
        configMap:
          name: tinyllama-hf-model
      - name: hf-cache
        persistentVolumeClaim:
          claimName: tinyllama-hf-cache
      - name: hf-pydeps
        persistentVolumeClaim:
          claimName: tinyllama-hf-pydeps
      initContainers:
      - name: add-hf-model
        image: busybox:1.36
        command: ["sh","-lc"]
        args:
        - |
          set -euo pipefail
          mkdir -p /models/tinyllama_hf/1
          cp /overlay/config.pbtxt /models/tinyllama_hf/config.pbtxt
          cp /overlay/model.py /models/tinyllama_hf/1/model.py
        volumeMounts:
        - name: models
          mountPath: /models
        - name: hf-model-files
          mountPath: /overlay
      - name: install-hf-deps
        image: nvcr.io/nvidia/tritonserver:25.04-py3
        command: ["bash","-lc"]
        args:
        - |
          set -euo pipefail
          if [ -f /hf-pydeps/torch/__init__.py ] && [ -d /hf-pydeps/transformers ]; then
            echo "HF deps already present in /hf-pydeps; skipping install."
            exit 0
          fi
          python3 -m pip install --no-cache-dir --upgrade --ignore-installed pip
          python3 -m pip install --no-cache-dir \
            --index-url https://download.pytorch.org/whl/cu126 \
            -t /hf-pydeps \
            torch
          python3 -m pip install --no-cache-dir -t /hf-pydeps \
            transformers safetensors sentencepiece
          python3 -m pip install --no-cache-dir -t /hf-pydeps \
            psutil
          # accelerate depends on torch, but we already installed the CUDA wheel above.
          python3 -m pip install --no-cache-dir -t /hf-pydeps --no-deps \
            accelerate
        volumeMounts:
        - name: hf-pydeps
          mountPath: /hf-pydeps
      containers:
      - name: triton
        image: nvcr.io/nvidia/tritonserver:25.04-py3
        imagePullPolicy: Always
        args:
        - tritonserver
        - --model-repository=/models
        - --log-verbose=1
        # OpenTelemetry tracing -> Jaeger (OTLP HTTP).
        - --trace-config=mode=opentelemetry
        - --trace-config=level=TIMESTAMPS
        - --trace-config=rate=1
        - --trace-config=opentelemetry,url=http://jaeger-collector.observability:4318/v1/traces
        - --trace-config=opentelemetry,resource=service.name=tinyllama-triton-hf
        - --trace-config=opentelemetry,resource=service.namespace=tinyllama
        ports:
        - containerPort: 8000
        - containerPort: 8001
        - containerPort: 8002
        env:
        - name: HF_HOME
          value: /hf-cache
        - name: TRANSFORMERS_CACHE
          value: /hf-cache
        - name: HF_HUB_DISABLE_TELEMETRY
          value: "1"
        - name: PYTHONPATH
          value: /hf-pydeps
        volumeMounts:
        - name: models
          mountPath: /models
        - name: dshm
          mountPath: /dev/shm
        - name: hf-cache
          mountPath: /hf-cache
        - name: hf-pydeps
          mountPath: /hf-pydeps
        resources:
          limits:
            nvidia.com/gpu: 1
            cpu: "4"
            memory: "16Gi"
          requests:
            nvidia.com/gpu: 1
            cpu: "2"
            memory: "8Gi"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: tinyllama-vllm-model
  namespace: tinyllama
data:
  config.pbtxt: |
    name: "tinyllama_vllm"

    # vLLM backend uses Triton's "generate" extension endpoint:
    #   POST /v2/models/tinyllama_vllm/generate
    # Request JSON uses:  { "text_input": "...", "parameters": { ... } }
    # Response JSON returns: { "text_output": "..." }
    backend: "vllm"

    # The usage of device is deferred to the vLLM engine.
    instance_group [
      {
        count: 1
        kind: KIND_MODEL
      }
    ]

    # Optional: enable vLLM metrics on Triton's /metrics endpoint (vllm:*).
    parameters: {
      key: "REPORT_CUSTOM_METRICS"
      value: { string_value: "true" }
    }
  model.json: |
    {
      "model": "TinyLlama/TinyLlama-1.1B-Chat-v1.0",
      "gpu_memory_utilization": 0.5,
      "enforce_eager": true
    }
---
apiVersion: v1
kind: Service
metadata:
  name: tinyllama-triton-hf-svc
  namespace: tinyllama
spec:
  type: LoadBalancer
  selector:
    app: tinyllama-triton-hf
  ports:
  - name: http
    port: 8000
    targetPort: 8000

---
apiVersion: v1
kind: Service
metadata:
  name: tinyllama-triton-hf-metrics
  namespace: tinyllama
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "8002"
    prometheus.io/path: "/metrics"
spec:
  type: ClusterIP
  selector:
    app: tinyllama-triton-hf
  ports:
  - name: metrics
    port: 8002
    targetPort: 8002

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: tinyllama-hf-model
  namespace: tinyllama
data:
  config.pbtxt: |
    name: "tinyllama_hf"
    backend: "python"
    max_batch_size: 0

    input [
      { name: "text_input" data_type: TYPE_STRING dims: [1] }
    ]

    output [
      { name: "text_output" data_type: TYPE_STRING dims: [1] }
    ]

    instance_group [
      { count: 1 kind: KIND_MODEL }
    ]
  model.py: |
    import json
    import os
    from typing import Any

    import numpy as np
    import torch
    import triton_python_backend_utils as pb_utils
    from transformers import AutoModelForCausalLM, AutoTokenizer


    def _get_param(params: dict[str, Any], key: str, default: Any) -> Any:
        v = params.get(key, default)
        return default if v is None else v


    class TritonPythonModel:
        def initialize(self, args):
            model_config = json.loads(args["model_config"])
            params = model_config.get("parameters", {})

            self.model_id = _get_param(params, "MODEL_ID", {"string_value": "TinyLlama/TinyLlama-1.1B-Chat-v1.0"}).get(
                "string_value", "TinyLlama/TinyLlama-1.1B-Chat-v1.0"
            )
            self.default_system = _get_param(
                params, "SYSTEM_PROMPT", {"string_value": "You are a helpful assistant. Answer concisely."}
            ).get("string_value", "You are a helpful assistant. Answer concisely.")

            # Generation defaults (can be overridden per request via JSON in text_input).
            self.default_max_new_tokens = int(
                _get_param(params, "MAX_NEW_TOKENS", {"string_value": "16"}).get("string_value", "16")
            )
            self.default_temperature = float(
                _get_param(params, "TEMPERATURE", {"string_value": "0.7"}).get("string_value", "0.7")
            )
            self.default_top_p = float(_get_param(params, "TOP_P", {"string_value": "0.95"}).get("string_value", "0.95"))

            # Hugging Face cache controls (use emptyDir/PVC for speed).
            cache_dir = os.environ.get("HF_HOME") or os.environ.get("TRANSFORMERS_CACHE") or None

            self.tokenizer = AutoTokenizer.from_pretrained(self.model_id, cache_dir=cache_dir)
            if getattr(self.tokenizer, "pad_token_id", None) is None and getattr(self.tokenizer, "eos_token_id", None) is not None:
                self.tokenizer.pad_token_id = self.tokenizer.eos_token_id

            self.model = AutoModelForCausalLM.from_pretrained(
                self.model_id,
                torch_dtype=torch.float16,
                device_map="cuda",
                cache_dir=cache_dir,
            )
            self.model.eval()

        def execute(self, requests):
            responses = []
            for request in requests:
                inp = pb_utils.get_input_tensor_by_name(request, "text_input")
                raw = inp.as_numpy()[0]
                if isinstance(raw, (bytes, bytearray)):
                    raw = raw.decode("utf-8", errors="ignore")
                text_input = str(raw)

                # Accept either a raw prompt string, or JSON:
                # {"prompt": "...", "system": "...", "max_tokens": 16, "temperature": 0.7, "top_p": 0.95}
                prompt = text_input
                system = self.default_system
                max_new_tokens = self.default_max_new_tokens
                temperature = self.default_temperature
                top_p = self.default_top_p

                if text_input and text_input.lstrip().startswith("{"):
                    try:
                        obj = json.loads(text_input)
                        prompt = str(obj.get("prompt", prompt))
                        system = str(obj.get("system", system))
                        if obj.get("max_tokens") is not None:
                            max_new_tokens = int(obj["max_tokens"])
                        if obj.get("temperature") is not None:
                            temperature = float(obj["temperature"])
                        if obj.get("top_p") is not None:
                            top_p = float(obj["top_p"])
                    except Exception:
                        # Fall back to treating it as a normal prompt string.
                        pass

                if getattr(self.tokenizer, "chat_template", None):
                    messages = [{"role": "system", "content": system}, {"role": "user", "content": prompt}]
                    rendered = self.tokenizer.apply_chat_template(messages, tokenize=False, add_generation_prompt=True)
                else:
                    rendered = prompt

                inputs = self.tokenizer(rendered, return_tensors="pt").to("cuda")
                with torch.inference_mode():
                    out = self.model.generate(
                        **inputs,
                        max_new_tokens=max_new_tokens,
                        do_sample=(temperature > 0),
                        temperature=max(temperature, 1e-6),
                        top_p=top_p,
                        pad_token_id=self.tokenizer.pad_token_id,
                        eos_token_id=getattr(self.tokenizer, "eos_token_id", None),
                    )
                decoded = self.tokenizer.decode(out[0], skip_special_tokens=False)

                resp = pb_utils.InferenceResponse(
                    output_tensors=[pb_utils.Tensor("text_output", np.array([decoded], dtype=object))]
                )
                responses.append(resp)
            return responses

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: tinyllama-hf-cache
  namespace: tinyllama
spec:
  accessModes: ["ReadWriteOnce"]
  storageClassName: ebs-gp3
  resources:
    requests:
      storage: 50Gi

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: tinyllama-hf-pydeps
  namespace: tinyllama
spec:
  accessModes: ["ReadWriteOnce"]
  storageClassName: ebs-gp3
  resources:
    requests:
      storage: 20Gi

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: tinyllama-vllm-cache
  namespace: tinyllama
spec:
  accessModes: ["ReadWriteOnce"]
  storageClassName: ebs-gp3
  resources:
    requests:
      storage: 50Gi

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: tinyllama-triton-vllm
  namespace: tinyllama
spec:
  replicas: 1
  selector:
    matchLabels:
      app: tinyllama-triton-vllm
  template:
    metadata:
      labels:
        app: tinyllama-triton-vllm
    spec:
      volumes:
      - name: models
        emptyDir: {}
      - name: dshm
        emptyDir:
          medium: Memory
      - name: vllm-cache
        persistentVolumeClaim:
          claimName: tinyllama-vllm-cache
      - name: vllm-model-files
        configMap:
          name: tinyllama-vllm-model
      initContainers:
      - name: add-vllm-model
        image: busybox:1.36
        command: ["sh","-lc"]
        args:
        - |
          set -euo pipefail
          mkdir -p /models/tinyllama_vllm/1
          cp /overlay/config.pbtxt /models/tinyllama_vllm/config.pbtxt
          cp /overlay/model.json /models/tinyllama_vllm/1/model.json
        volumeMounts:
        - name: models
          mountPath: /models
        - name: vllm-model-files
          mountPath: /overlay
      containers:
      - name: triton
        image: nvcr.io/nvidia/tritonserver:25.04-vllm-python-py3
        imagePullPolicy: Always
        args:
        - tritonserver
        - --model-repository=/models
        - --log-verbose=1
        - --trace-config=mode=opentelemetry
        - --trace-config=level=TIMESTAMPS
        - --trace-config=rate=1
        - --trace-config=opentelemetry,url=http://jaeger-collector.observability:4318/v1/traces
        - --trace-config=opentelemetry,resource=service.name=tinyllama-triton-vllm
        - --trace-config=opentelemetry,resource=service.namespace=tinyllama
        ports:
        - containerPort: 8000
        - containerPort: 8001
        - containerPort: 8002
        env:
        - name: HF_HOME
          value: /hf-cache
        - name: TRANSFORMERS_CACHE
          value: /hf-cache
        - name: HF_HUB_DISABLE_TELEMETRY
          value: "1"
        volumeMounts:
        - name: models
          mountPath: /models
        - name: dshm
          mountPath: /dev/shm
        - name: vllm-cache
          mountPath: /hf-cache
        resources:
          limits:
            nvidia.com/gpu: 1
            cpu: "4"
            memory: "16Gi"
          requests:
            nvidia.com/gpu: 1
            cpu: "2"
            memory: "8Gi"

---
apiVersion: v1
kind: Service
metadata:
  name: tinyllama-triton-vllm-svc
  namespace: tinyllama
spec:
  type: LoadBalancer
  selector:
    app: tinyllama-triton-vllm
  ports:
  - name: http
    port: 8000
    targetPort: 8000

